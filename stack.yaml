# Yesod project for oura-dashboard (Haskell port).
# LTS 24.50 ships GHC 9.10.3 (aeson 2.2, text 2.1, persistent 2.17).
resolver: lts-24.50

packages:
- .

extra-deps:
# Dropped from LTS 24.50's snapshot.
- dotenv-0.12.0.0

# dotenv 0.12 has a stale data-default-class <0.2 cap. Pinning the old version
# instead would give Settings.hs a different Default class than yesod's
# instances use, so relax the bound for dotenv only.
allow-newer: true
allow-newer-deps:
- dotenv
